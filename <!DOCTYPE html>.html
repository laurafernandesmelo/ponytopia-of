<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum My Little Pony - Coleção Real</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffdff3, #e7dcff, #dff7ff);
        }

        /* FUNDO PASTEL MÁGICO */
        body::before, body::after {
            content: ""; position: absolute; border-radius: 50%; pointer-events: none;
        }
        body::before { 
            width: 1200px; height: 1200px; 
            background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 70%); 
            top: -400px; left: -400px; 
        }
        body::after { 
            width: 1000px; height: 1000px; 
            background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 70%); 
            bottom: -400px; right: -400px; 
        }

        .container {
            position: relative;
            z-index: 2;
            perspective: 2500px;
            text-align: center;
            width: 100%;
        }

        /* PACOTE GIGANTE */
        .pack-wrapper {
            position: relative;
            width: 800px; 
            max-width: 90vw;
            cursor: pointer;
            margin: 0 auto;
            user-select: none;
        }

        .pack-half {
            width: 100%;
            height: auto;
            display: block;
            -webkit-user-drag: none;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .pack-top {
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            z-index: 10;
        }

        .pack-bottom {
            position: absolute;
            top: 0;
            left: 0;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
            z-index: 9;
        }

        /* ESTÁGIOS DOS CLIQUES */
        .stage-1 .pack-half { animation: shake-light 0.3s infinite; }
        .stage-2 .pack-half { 
            animation: shake-heavy 0.2s infinite; 
            filter: brightness(1.2) drop-shadow(0 0 40px rgba(255,255,255,0.6));
        }
        .stage-3 .pack-top { transform: translateY(-110px) rotateX(25deg) rotateZ(-3deg); }
        .stage-3 .pack-bottom { transform: translateY(40px) rotateX(-20deg) rotateZ(2deg); }

        .stage-4 .pack-top { transform: translateY(-1300px) scale(0.1); opacity: 0; }
        .stage-4 .pack-bottom { transform: translateY(1300px) scale(0.1); opacity: 0; }

        /* ÁREA DAS CARTAS REVELADAS */
        .reward-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
        }

        .show-reward .reward-screen { 
            display: block; 
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }

        .cards-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: nowrap;
        }

        .card {
            width: 180px; /* Ajuste leve para caberem as 5 lado a lado */
            height: 255px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 8px solid white;
            overflow: hidden;
            opacity: 0;
            transform: translateY(60px);
            animation: cardAppear 0.6s forwards;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* ANIMAÇÕES */
        @keyframes shake-light { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(3px, 3px); } }
        @keyframes shake-heavy { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 75% { transform: translate(8px, -8px); } }
        @keyframes zoomIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.4); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }

        .btn-restart {
            margin-top: 50px;
            padding: 15px 50px;
            background: white;
            color: #b194e8;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(177, 148, 232, 0.3);
            transition: 0.3s ease;
        }
        .btn-restart:hover { transform: scale(1.1); background: #fdfbff; }

        @media (max-width: 1000px) {
            .cards-container { flex-wrap: wrap; }
            .card { width: 130px; height: 185px; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    
    <div id="pacote" class="pack-wrapper">
        <img src="pacote.png" class="pack-half pack-top" alt="Pacote">
        <img src="pacote.png" class="pack-half pack-bottom" alt="Pacote">
    </div>

    <div id="reward" class="reward-screen">
        <h1 style="color: #a385e0; font-size: 3.5rem; text-shadow: 2px 2px white; margin-bottom: 10px;">✦ INCRÍVEL! ✦</h1>
        <div class="cards-container" id="display-cartas"></div>
        <button class="btn-restart" onclick="location.reload()">Abrir novo pacote</button>
    </div>

</div>

<script>
    // LISTA COMPLETA (22 cartas no total agora)
    const todasAsCartas = [
        { img: "princesaluna.jpeg" },
        { img: "princesacadence.jpeg" },
        { img: "applejack.jpeg" },
        { img: "pinkiepie.jpeg" },
        { img: "rarity.jpeg" },
        { img: "fluttershy.jpeg" },
        { img: "twilight.jpeg" },
        { img: "rainbowdash.jpeg" },
        { img: "apple.png" },
        { img: "sparkle.jpg" },
        { img: "princess.jpg" },
        { img: "lu.jpg" },
        { img: "cada.jpg" },
        { img: "pie.jpg" },
        { img: "rar.jpg" },
        { img: "rain.jpg" },
        // NOVAS CARTAS BABY:
        { img: "babyflur.jpeg" },
        { img: "raritybaby.jpg" },
        { img: "pinkiebaby.jpg" },
        { img: "applebaby.jpg" },
        { img: "rainbaby.jpg" },
        { img: "twibaby.jpg" }
    ];

    const container = document.getElementById('main-container');
    const pacote = document.getElementById('pacote');
    const displayCartas = document.getElementById('display-cartas');
    let cliques = 0;

    pacote.addEventListener('click', () => {
        if (cliques >= 4) return;
        
        cliques++;
        
        container.classList.remove('stage-1', 'stage-2', 'stage-3', 'stage-4');

        if (cliques === 1) container.classList.add('stage-1');
        else if (cliques === 2) container.classList.add('stage-2');
        else if (cliques === 3) container.classList.add('stage-3');
        else if (cliques === 4) {
            container.classList.add('stage-4');

            // SORTEIO DE 5 CARTAS ALEATÓRIAS
            const sorteadas = [...todasAsCartas].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            displayCartas.innerHTML = '';
            sorteadas.forEach((carta, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.animationDelay = (i * 0.2) + "s";
                div.innerHTML = `<img src="${carta.img}" onerror="this.src='https://via.placeholder.com/180x255?text=Pony'">`;
                displayCartas.appendChild(div);
            });

            setTimeout(() => {
                pacote.style.display = 'none';
                container.classList.add('show-reward');
            }, 800);
        }
    });
</script>

</body>
</html>
